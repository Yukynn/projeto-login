<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto login</title>
    <link rel="shortcut icon" href="imagens/samurai_warrior_japanese_mask_traditional_helmet_japan_face_icon_127293.ico" type="image/x-icon">

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    


    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>

                <p>Seja bem-vindo(a) novamente. Faça o login para acessar sua conta e poder configurar seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                    
                        <span class="material-symbols-outlined cafe">login</span>
                        <input type="email" name="login" id="ilogin" placeholder="Seu e-mail" size="17" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>
                    </div>
                    
                    <div class="campo">
                    
                        <span class="material-symbols-outlined">encrypted
                        </span>
                        <input type="password" name="senha" id="isenha" placeholder="Sua senha"  autocomplete="current-password" required minlength="8" size="17">
                        <label for="isenha">Senha</label>
                    </div>

                    
                    <input type="submit" value="Entrar">

                    <a href="recuperar.html" class="botao" >Esqueci a senha <span class="material-symbols-outlined">lock_reset</span></form></a>
                </form>
                
            </div>
        </section>
    </main>
</body>
</html>
